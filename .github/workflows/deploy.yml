name: CI/CD EasyPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  ci-front:
    name: Front CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

  ci-back:
    name: Back CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json


      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

  deploy:
    name: Trigger EasyPanel redeploy
    runs-on: ubuntu-latest
    needs:
      - ci-front
      - ci-back
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger deploy webhook
        env:
          EASYPANEL_DEPLOY_WEBHOOK: ${{ secrets.EASYPANEL_DEPLOY_WEBHOOK }}
          EASYPANEL_DEPLOY_TOKEN: ${{ secrets.EASYPANEL_DEPLOY_TOKEN }}
        run: |
          if [ -z "$EASYPANEL_DEPLOY_WEBHOOK" ]; then
            echo "Missing secret: easypanel_deploy_webhook"
            exit 1
          fi

          if [ -n "$EASYPANEL_DEPLOY_TOKEN" ]; then
            curl --fail --silent --show-error \
              -X POST "$EASYPANEL_DEPLOY_WEBHOOK" \
              -H "Authorization: Bearer $EASYPANEL_DEPLOY_TOKEN"
          else
            curl --fail --silent --show-error \
              -X POST "$EASYPANEL_DEPLOY_WEBHOOK"
          fi

          echo "EasyPanel redeploy triggered successfully."
